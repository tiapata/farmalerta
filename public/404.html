<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FarmAlerta - Redirecionando...</title>
    <script type="text/javascript">
      // GitHub Pages Single Page App Hack
      // Este script redireciona caminhos diretos para a versão com hash (#) 
      // para que o TanStack Router (Hash History) possa processar a rota.
      var path = window.location.pathname;
      var hash = window.location.hash;
      
      // Se não estiver na raiz, redireciona para /#/caminho
      if (path && path !== '/') {
        // Remove a barra final se existir para evitar //#
        var cleanPath = path.replace(/\/$/, '');
        window.location.replace(window.location.origin + '/#' + cleanPath + hash);
      } else {
        // Se cair aqui por erro na raiz, volta para o início
        window.location.replace(window.location.origin + '/');
      }
    </script>
  </head>
  <body>
    <p>Redirecionando para o aplicativo...</p>
  </body>
</html>
