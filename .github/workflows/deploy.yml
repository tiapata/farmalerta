name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No cache if lock file is missing or using different managers

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /farmalerta/

      - name: Fix for SPA (404.html)
        run: |
          # TanStack Start normally generates a full static build if configured,
          # but here we need a fallback for GitHub Pages.
          # Since it's a client-side SPA in this context:
          if [ -f "dist/client/index.html" ]; then
            cp dist/client/index.html dist/client/404.html
          elif [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client' # We'll try client first, fallback if empty in next step if needed

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4