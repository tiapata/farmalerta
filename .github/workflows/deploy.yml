name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No cache if lock file is missing or using different managers

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx vite build --ssr false
        env:
          VITE_BASE_PATH: /farmalerta/

      - name: Debug Build Output
        run: |
          ls -R dist/

      - name: Fix for SPA (404.html)
        run: |
          # If dist/client exists (standard TanStack Start), use it.
          # If not, use dist/ root.
          if [ -d "dist/client" ]; then
            TARGET_DIR="dist/client"
          else
            TARGET_DIR="dist"
          fi
          
          if [ -f "$TARGET_DIR/index.html" ]; then
            cp "$TARGET_DIR/index.html" "$TARGET_DIR/404.html"
          fi
          echo "DEPLOY_PATH=$TARGET_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4